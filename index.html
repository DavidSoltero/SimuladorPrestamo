
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Préstamo</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Simulador de Préstamo</h1>
            <p>Calculadora de amortización mediante sistema francés</p>
        </header>

        <div id="formulario">
            <div class="form-grid">
                <div class="input-group">
                    <label for="nominal">Nominal del préstamo (€)</label>
                    <input type="number" id="nominal" min="100000" max="200000" placeholder="Ej. 150000">
                </div>

                <div class="input-group">
                    <label for="duracion">Duración (años)</label>
                    <input type="number" id="duracion" min="0.1" max="30" step="0.1" placeholder="Ej. 25">
                </div>

                <div class="input-group">
                    <label for="periodicidad">Periodicidad</label>
                    <select id="periodicidad">
                        <option value="mensual">Mensual</option>
                        <option value="trimestral">Trimestral</option>
                        <option value="semestral">Semestral</option>
                        <option value="anual">Anual</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="euribor">Euríbor 12 meses (%)</label>
                    <input type="number" id="euribor" step="0.01" placeholder="Ej. 3.5">
                </div>

                <div class="input-group">
                    <label for="tipo">Tipo de interés</label>
                    <select id="tipo">
                        <option value="fijo">Fijo</option>
                        <option value="variable">Variable</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="bonificacion">Bonificación (%)</label>
                    <input type="number" id="bonificacion" step="0.01" min="0.10" max="0.25" placeholder="Ej. 0.25">
                </div>
            </div>

            <button onclick="calcular()">Calcular Cuota</button>
        </div>

        <div class="resultados-container" id="resultados-container">
            <div class="resultado-box">
                <div class="resultado-titulo">Tipo Nominal</div>
                <div id="resultado_nominal" class="resultado-valor">--</div>
            </div>

            <div class="resultado-box highlight">
                <div class="resultado-titulo">Cuota a pagar</div>
                <div id="resultado_cuota" class="resultado-valor">--</div>
            </div>

            <div class="resultado-box">
                <div class="resultado-titulo">TAE</div>
                <div id="resultado_tae" class="resultado-valor">--</div>
            </div>
        </div>

        <div id="seccion_amortizacion">
            <h2 id="titulo_amortizacion" class="titulo-amortizacion">Cuadro de Amortización</h2>
            <div class="table-wrapper">
                <div id="tabla_amortizacion"></div>
            </div>
        </div>
    </div>

    <script src="simulador.js"></script>
</body>
</html>
